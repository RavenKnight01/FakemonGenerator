<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Playpen+Sans+Hebrew:wght@100..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Random Pokemon Generator</title>
</head>
<body>
 <div class="container">
    <div class="title">Random Pokemon Generator</div>
    <div class="subtitle"> by Raven </div>
    <div class="subtitle">* with updated Pokedex!</div>

    <div class="button-container"><button onclick="generateAnimalWithAnimation(0)">Base</button><span class="number" id="num0"></span></div>
    <div class="button-container"><button onclick="generateAnimalWithAnimation(1)">Ears</button><span class="number" id="num1"></span></div>
    <div class="button-container"><button onclick="generateAnimalWithAnimation(2)">Tail</button><span class="number" id="num2"></span></div>
    <div class="button-container"><button onclick="generateAnimalWithAnimation(3)">Head Accessory</button><span class="number" id="num3"></span></div>
    <div class="button-container"><button onclick="generateAnimalWithAnimation(4)">Neck Accessory</button><span class="number" id="num4"></span></div>
    <div class="button-container"><button onclick="generateAnimalWithAnimation(5)">Leg Accessory</button><span class="number" id="num5"></span></div>
    <div class="button-container"><button onclick="generateAnimalWithAnimation(6)">Small Decoration</button><span class="number" id="num6"></span></div>
    <div class="button-container"><button onclick="generateAnimalWithAnimation(7)">Color</button><span class="number" id="num7"></span></div>
    <div class="button-container"><button onclick="generateAnimalWithAnimation(8)">Extra</button><span class="number" id="num8"></span></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
